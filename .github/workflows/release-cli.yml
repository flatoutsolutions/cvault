# =============================================================================
#  release-cli.yml — cvault CLI release pipeline
# -----------------------------------------------------------------------------
#  Triggered by pushing a `cli-v*` semver tag (e.g. cli-v0.1.0, cli-v1.2.3).
#
#  Pipeline:
#    1. test        — typecheck, lint, vitest in cli/
#    2. bundle      — bun build a single portable cvault.bundle.js (URLs
#                     baked from prod secrets), tar + sha256, upload.
#    3. release     — collect artifact, create GitHub Release with
#                     cvault.bundle.js.tar.gz + SHA256SUMS.txt.
#    4. update-tap  — rewrite Formula/cvault.rb in the homebrew tap repo
#                     (url + sha256 + version) and push directly to main.
#
#  Distribution model rationale: Bun's `--compile` Mach-O output is
#  unsignable on macOS (Bun 1.3.12 bug), so we ship a single bundled .js
#  file plus a bash shim in the formula that `exec`s it through homebrew's
#  `bun`. One artifact for every platform — no per-OS or per-arch matrix.
#  See docs/superpowers/specs/2026-05-03-cvault-production-deployment.md.
#
#  Hardening:
#    * Third-party actions pinned to commit SHAs (annotated with version tag).
#    * `concurrency` cancels stale runs on the same tag.
#    * `permissions:` granted only where the job needs them.
# =============================================================================

name: Release CLI

# Quoted "on" because some YAML 1.1 parsers (Ruby psych, older yamllint)
# coerce the bare key to boolean `true`. GitHub Actions tolerates either,
# but the quoted form is unambiguous everywhere.
'on':
  push:
    tags:
      # Semver-tagged CLI releases: cli-v0.1.0, cli-v1.2.3, cli-v2.0.0-rc.1, ...
      - 'cli-v*'

# Top-level permissions are intentionally minimal; jobs widen as needed.
permissions:
  contents: read

# Cancel any in-progress run for the same tag — a re-pushed tag should win.
concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single source of truth for the Bun version used in CI. Bump in lock-step
  # with cli/.bun-version once that file is in place.
  BUN_VERSION: '1.2.21'
  # Subdirectory containing the CLI package. Mirrors the spec (§7).
  CLI_DIR: cli
  # Homebrew tap repo (owner/name). The tap MUST live at a stable URL so
  # end users can `brew install flatoutsolutions/cvault/cvault`.
  TAP_REPO: flatoutsolutions/homebrew-cvault
  # Single artifact name for the bundle and its tarball. Used by both the
  # bundle job (uploading) and the release/update-tap jobs (downloading
  # + URL substitution in the formula).
  BUNDLE_ASSET: cvault.bundle.js
  BUNDLE_TARBALL: cvault.bundle.js.tar.gz

jobs:
  # ===========================================================================
  # 1) test — fast, single-OS gate. Must pass before we burn build minutes.
  # ===========================================================================
  test:
    name: Test (typecheck + lint + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source at tag
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1

      # Root deps + cached node_modules + convex codegen in one shot.
      # Same setup action as .github/workflows/deploy.yml — handles Node 22,
      # corepack, yarn install with cache, and `npx convex codegen` so that
      # `convex/_generated/*` exists before tsc / vitest run.
      - uses: flatoutsolutions/github-actions/setup@v1
        with:
          node-version: '22.21.1'
          convex-codegen: 'true'
          convex-deploy-key: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Install Bun ${{ env.BUN_VERSION }}
        # oven-sh/setup-bun v2.2.0
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install CLI dependencies
        working-directory: ${{ env.CLI_DIR }}
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        working-directory: ${{ env.CLI_DIR }}
        run: bunx tsc --noEmit

      - name: Lint (ESLint flat config — root-scoped)
        run: yarn lint:check

      # bunx --bun forces Vitest to run inside the embedded Bun runtime so
      # `Bun.spawn`/`Bun.serve` globals are available to test code.
      - name: Run unit tests (vitest, under Bun runtime)
        working-directory: ${{ env.CLI_DIR }}
        run: bunx --bun vitest run

  # ===========================================================================
  # 2) bundle — single portable JS artifact. URLs from prod secrets get
  # baked into src/buildInfo.ts by the orchestrator before `bun build`,
  # then reset on exit so the working copy stays clean either way.
  # ===========================================================================
  bundle:
    name: Build portable bundle
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source at tag
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1

      # Same shared setup as the test job: Node + yarn (cached) + convex
      # codegen so the bundler can resolve `@cvault/convex/api`.
      - uses: flatoutsolutions/github-actions/setup@v1
        with:
          node-version: '22.21.1'
          convex-codegen: 'true'
          convex-deploy-key: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Install Bun ${{ env.BUN_VERSION }}
        # oven-sh/setup-bun v2.2.0
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install CLI dependencies
        working-directory: ${{ env.CLI_DIR }}
        run: bun install --frozen-lockfile

      # The orchestrator reads CVAULT_*_URL env vars (with VITE/CLERK
      # fallbacks), bakes them into src/buildInfo.ts, runs `bun build`,
      # then resets src/buildInfo.ts on exit. URLs derived from
      # CONVEX_DEPLOY_KEY + CLERK_PUBLISHABLE_KEY mirror deploy.yml's
      # build-step pattern (no separate VITE/CVAULT URL secrets needed).
      - name: Build portable JS bundle (URLs baked from prod secrets)
        working-directory: ${{ env.CLI_DIR }}
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          # The Clerk OAuth application's Client ID — required by `cvault login`
          # (OAuth Authorization Code + PKCE). `build-bundle.ts` reads
          # CVAULT_OAUTH_CLIENT_ID from the step env and bakes it into
          # BUILD_DEFAULTS.clientId. Reuses the same secret deploy.yml feeds to
          # Convex as CLERK_OAUTH_CLIENT_ID (one OAuth app → one client id).
          # Without this the shipped binary had an empty clientId and `cvault
          # login` failed with "missing CVAULT_OAUTH_CLIENT_ID".
          CVAULT_OAUTH_CLIENT_ID: ${{ secrets.CLERK_OAUTH_CLIENT_ID }}
          # Cloudflare auto-suffixed our `cvault` project name (the
          # bare `cvault.pages.dev` host was already taken globally by an
          # unrelated project). Use the real assigned hostname.
          DASHBOARD_URL: https://cvault-bsy.pages.dev
        run: |
          # Fail loudly if the client id secret is missing rather than baking an
          # empty value and shipping a binary whose `cvault login` throws.
          if [ -z "$CVAULT_OAUTH_CLIENT_ID" ]; then
            echo "::error::CVAULT_OAUTH_CLIENT_ID is empty — set the CLERK_OAUTH_CLIENT_ID repo secret"
            exit 1
          fi
          DEPLOY_NAME=$(echo "$CONVEX_DEPLOY_KEY" | sed 's/.*:\(.*\)|.*/\1/')
          export VITE_CONVEX_URL="https://${DEPLOY_NAME}.convex.cloud"
          # Derive the Clerk Frontend API URL from the publishable key
          # (everything between `pk_live_` / `pk_test_` and the trailing `$`
          # is base64-encoded `<host>$`).
          export CLERK_FRONTEND_API_URL="https://$(echo "$CLERK_PUBLISHABLE_KEY" | sed 's/pk_[a-z]*_//' | base64 -d | tr -d '$')"
          export CVAULT_DASHBOARD_URL="$DASHBOARD_URL"
          echo "Bundling with VITE_CONVEX_URL=$VITE_CONVEX_URL CLERK_FRONTEND_API_URL=$CLERK_FRONTEND_API_URL CVAULT_DASHBOARD_URL=$CVAULT_DASHBOARD_URL CVAULT_OAUTH_CLIENT_ID=${CVAULT_OAUTH_CLIENT_ID:+<set>}"
          bun run scripts/build-bundle.ts

      - name: Smoke-check bundle (size + JS-ness)
        working-directory: ${{ env.CLI_DIR }}
        run: |
          ls -lh dist/${{ env.BUNDLE_ASSET }}
          file dist/${{ env.BUNDLE_ASSET }} || true
          # Sanity: the bundle should at least mention the binary name.
          grep -q "cvault" dist/${{ env.BUNDLE_ASSET }}

      - name: Tar + gzip the bundle for release upload
        # The Formula's `url` points at the .tar.gz (Homebrew unpacks
        # tarballs automatically before invoking `install`). Plain .js
        # uploads don't auto-extract and would force a custom strategy.
        working-directory: ${{ env.CLI_DIR }}/dist
        run: |
          tar -czf ${{ env.BUNDLE_TARBALL }} ${{ env.BUNDLE_ASSET }}
          ls -lh ${{ env.BUNDLE_TARBALL }}

      - name: Upload bundle tarball as workflow artifact
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.BUNDLE_TARBALL }}
          path: ${{ env.CLI_DIR }}/dist/${{ env.BUNDLE_TARBALL }}
          if-no-files-found: error
          retention-days: 7

  # ===========================================================================
  # 3) release — collect tarball, hash, publish the GitHub Release.
  # ===========================================================================
  release:
    name: Publish GitHub Release
    needs: [test, bundle]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Required by softprops/action-gh-release to create the release object.
      contents: write
    outputs:
      # Surface the bundle sha256 so update-tap can consume it without
      # re-downloading and rehashing the tarball.
      sha256_bundle: ${{ steps.hashes.outputs.sha256_bundle }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Derive version from tag (strip `cli-v` prefix)
        id: version
        # github.ref_name = "cli-v0.1.0" → version = "0.1.0"
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#cli-v}"
          if [ -z "$version" ] || [ "$version" = "$tag" ]; then
            echo "::error::Tag '$tag' does not match expected format 'cli-vX.Y.Z'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Download the bundle tarball artifact
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ env.BUNDLE_TARBALL }}
          path: artifacts

      - name: Compute sha256 sum and SHA256SUMS.txt
        id: hashes
        working-directory: artifacts
        run: |
          set -euo pipefail
          ls -la
          sha_bundle=$(sha256sum ${{ env.BUNDLE_TARBALL }} | awk '{print $1}')
          sha256sum ${{ env.BUNDLE_TARBALL }} > SHA256SUMS.txt
          cat SHA256SUMS.txt
          echo "sha256_bundle=$sha_bundle" >> "$GITHUB_OUTPUT"

      - name: Render release notes body
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_BUNDLE: ${{ steps.hashes.outputs.sha256_bundle }}
        run: |
          {
            echo "## cvault $VERSION"
            echo ""
            echo "Centralized Claude Code credential vault — Mac Keychain"
            echo "credential sync across machines via Convex."
            echo ""
            echo "### Install (Homebrew, recommended)"
            echo ""
            echo '```sh'
            echo "brew install flatoutsolutions/cvault/cvault"
            echo '```'
            echo ""
            echo "On macOS, this also installs \`bun\` as a dependency. The"
            echo "\`cvault\` binary is a thin shim that \`exec\`s the bundled"
            echo "JS through bun."
            echo ""
            echo "### Manual download"
            echo ""
            echo "| Asset                              | sha256 |"
            echo "| ---------------------------------- | ------ |"
            echo "| \`${{ env.BUNDLE_TARBALL }}\` | \`$SHA_BUNDLE\` |"
            echo ""
            echo "Verify with the bundled \`SHA256SUMS.txt\`:"
            echo ""
            echo '```sh'
            echo "sha256sum -c SHA256SUMS.txt"
            echo '```'
          } > RELEASE_NOTES.md

      - name: Create GitHub Release and attach assets
        # softprops/action-gh-release v3.0.0
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          name: cvault ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          # Tag pre-releases automatically (anything past `cli-vX.Y.Z-…`).
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          make_latest: ${{ contains(steps.version.outputs.version, '-') == false }}
          fail_on_unmatched_files: true
          files: |
            artifacts/${{ env.BUNDLE_TARBALL }}
            artifacts/SHA256SUMS.txt

  # ===========================================================================
  # 4) update-tap — rewrite Formula/cvault.rb in the homebrew tap repo
  # with the new version + bundle sha256, then push directly to main.
  # The formula on the tap is otherwise identical to the template in
  # this repo, so a direct push (no PR) is the lowest-friction path.
  # ===========================================================================
  update-tap:
    name: Push updated formula to homebrew tap
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate tap secret is present
        # Fail fast if the PAT is missing rather than after the checkout step.
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::error::Repository secret HOMEBREW_TAP_TOKEN is not set."
            echo "::error::Create a fine-scoped PAT with 'contents:write' on $TAP_REPO and add it as HOMEBREW_TAP_TOKEN."
            exit 1
          fi

      - name: Checkout cvault repo to grab the formula template
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          path: cvault-src

      - name: Checkout homebrew tap repo (${{ env.TAP_REPO }})
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Land on `main` of the tap repo and push there directly.
          ref: main
          path: tap
          persist-credentials: true

      - name: Stamp Formula/cvault.rb with version + bundle sha256
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA_BUNDLE: ${{ needs.release.outputs.sha256_bundle }}
        run: |
          set -euo pipefail
          src="cvault-src/Formula/cvault.rb"
          dst="tap/Formula/cvault.rb"
          if [ ! -f "$src" ]; then
            echo "::error::Expected $src in cvault repo. Cannot stamp tap formula."
            exit 1
          fi
          mkdir -p tap/Formula
          cp "$src" "$dst"
          # version "X.Y.Z"
          sed -i.bak -E "s/^([[:space:]]*version[[:space:]]+\")[^\"]*(\".*)$/\1${VERSION}\2/" "$dst"
          # SHA256_BUNDLE_PLACEHOLDER → real hash. Single marker — never
          # change the marker string in Formula/cvault.rb without updating
          # this script.
          python3 - "$dst" <<PY
          import os, sys
          path = sys.argv[1]
          with open(path) as f:
              src = f.read()
          marker = "SHA256_BUNDLE_PLACEHOLDER"
          sha = os.environ["SHA_BUNDLE"]
          if marker not in src:
              print(f"::error::Marker {marker} not present in formula template — cannot stamp.")
              sys.exit(1)
          src = src.replace(marker, sha)
          with open(path, "w") as f:
              f.write(src)
          PY
          rm -f "${dst}.bak"
          echo "----- Stamped $dst -----"
          cat "$dst"

      - name: Commit and push the stamped formula to tap main
        working-directory: tap
        env:
          VERSION: ${{ needs.release.outputs.version }}
          GH_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name  "cvault-release[bot]"
          git config user.email "cvault-release[bot]@users.noreply.github.com"
          git add Formula/cvault.rb
          if git diff --cached --quiet; then
            echo "Tap formula already at this version+sha — nothing to push."
            exit 0
          fi
          git commit -m "cvault ${VERSION}" \
                     -m "Auto-generated by release-cli workflow." \
                     -m "Run: ${GH_RUN_URL}"
          git push origin main
