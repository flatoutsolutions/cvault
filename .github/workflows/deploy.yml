name: CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ============================================
  # Phase I — CI Checks (always run, in parallel)
  # ============================================
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: flatoutsolutions/github-actions/setup@v1
        with:
          node-version: '22.21.1'
      - name: Format check
        run: yarn format:check

  # `convex/_generated/` is committed so lint/build/test can run without
  # a Convex deploy key. Refresh with `npx convex codegen` (or `convex
  # dev`) when schema or function signatures change locally.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: flatoutsolutions/github-actions/setup@v1
        with:
          node-version: '22.21.1'
      - name: Lint
        run: yarn lint:check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: flatoutsolutions/github-actions/setup@v1
        with:
          node-version: '22.21.1'
      - name: Build
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          NODE_ENV: ${{ vars.ENVIRONMENT }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE }}
        run: |
          # When secrets aren't configured (fresh repo), substitute
          # placeholders so the env-validation in frontend/src/lib/env.ts
          # passes and the bundle still compiles. The artifact is fine to
          # ship to deploy-frontend gating; that job is itself gated on
          # vars.HAS_CLOUDFLARE_API_TOKEN.
          if [ -n "$CONVEX_DEPLOY_KEY" ]; then
            DEPLOY_NAME=$(echo "$CONVEX_DEPLOY_KEY" | sed 's/.*:\(.*\)|.*/\1/')
            export VITE_CONVEX_URL="https://${DEPLOY_NAME}.convex.cloud"
          else
            export VITE_CONVEX_URL="https://placeholder.convex.cloud"
          fi
          if [ -z "$VITE_CLERK_PUBLISHABLE_KEY" ]; then
            export VITE_CLERK_PUBLISHABLE_KEY="pk_test_placeholder"
          fi
          echo "Building with VITE_CONVEX_URL: $VITE_CONVEX_URL (NODE_ENV=$NODE_ENV)"
          yarn build
      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/client
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: flatoutsolutions/github-actions/setup@v1
        with:
          node-version: '22.21.1'
      - name: Run tests
        run: yarn test
      - name: Run integration tests
        run: yarn test:integration

  # ── Sync secrets to Convex (parallel with CI checks) ──
  # Runs alongside lint/build/test so it adds zero wall-clock time.
  # Must complete before deploy-backend to avoid the Convex
  # "Environment variables have changed during push" race condition.
  # Skipped automatically when CONVEX_DEPLOY_KEY is not configured (e.g.
  # before the prod deployment is wired up) — otherwise the job would
  # fail every push on a fresh repo.
  sync-secrets:
    if: github.event_name == 'push' && vars.HAS_CONVEX_DEPLOY_KEY == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: flatoutsolutions/github-actions/setup@v1
        with:
          node-version: '22.21.1'

      - name: Sync Secrets to Convex
        id: sync-convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          set_convex_env() {
            local key=$1
            local value=$2
            if [ -n "$value" ]; then
              local max_attempts=3
              local attempt=1
              while [ $attempt -le $max_attempts ]; do
                if echo "$value" | npx convex env set "$key"; then
                  echo "✓ $key"
                  return 0
                fi
                if [ $attempt -lt $max_attempts ]; then
                  sleep $((2 ** attempt))
                fi
                attempt=$((attempt + 1))
              done
              echo "✗ Failed to set $key"
              return 1
            fi
          }

          CLERK_FAPI=$(echo "$CLERK_PUBLISHABLE_KEY" | sed 's/pk_[a-z]*_//' | base64 -d | tr -d '$')

          set_convex_env "ENVIRONMENT" "${{ vars.ENVIRONMENT }}"
          set_convex_env "CLERK_FRONTEND_API_URL" "https://$CLERK_FAPI"
          set_convex_env "CLERK_WEBHOOK_SECRET" "$CLERK_WEBHOOK_SECRET"
          set_convex_env "CLERK_SECRET_KEY" "$CLERK_SECRET_KEY"
          set_convex_env "CLERK_PUBLISHABLE_KEY" "$CLERK_PUBLISHABLE_KEY"

  # ============================================
  # Phase II — Detect which components have changes
  #            (only after all CI checks pass)
  # ============================================
  detect-changes:
    needs: [format, lint, build, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'convex/**'
              - 'package.json'
              - 'yarn.lock'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'yarn.lock'
              - 'tsconfig.json'
              - 'tsconfig.app.json'
              - 'tsconfig.node.json'
              - 'components.json'

  # ============================================
  # Phase III — Deploy Backend to Convex
  # ============================================
  deploy-backend:
    needs: [detect-changes, sync-secrets]
    if: |
      github.event_name == 'push'
      && needs.detect-changes.outputs.backend == 'true'
      && vars.HAS_CONVEX_DEPLOY_KEY == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: flatoutsolutions/github-actions/setup@v1
        with:
          node-version: '22.21.1'

      - name: Deploy Backend to Convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy --yes

  # ============================================
  # Phase III — Deploy Frontend to Cloudflare Pages
  # ============================================
  deploy-frontend:
    needs: [detect-changes, build]
    if: |
      github.event_name == 'push'
      && needs.detect-changes.outputs.frontend == 'true'
      && vars.HAS_CLOUDFLARE_API_TOKEN == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist

      - name: Deploy Frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
